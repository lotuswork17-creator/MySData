name: TipsON Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # runs every day at 8am UTC
  workflow_dispatch:        # allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install selenium requests

      - name: Run scraper
        run: python TipsON-Download.py

      - name: Save results to repo
        run: |
          git config user.email "bot@bot.com"
          git config user.name "DataBot"
          git add TipsON/
          git commit -m "Update TipsON $(date)" && git push

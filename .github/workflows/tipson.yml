name: TipsON Scraper

on:
  schedule:
    - cron: '0 0 * * *'      # 00:00 UTC = 08:00 Hong Kong, daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Install Python packages
        run: pip install selenium requests pytz

      - name: Run scraper
        run: python TipsON-Download.py

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add TipsON/
          git diff --staged --quiet || git commit -m "Update TipsON $(date +'%Y-%m-%d')"
          git push

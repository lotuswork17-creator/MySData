name: TipsON Scraper

on:
  schedule:
    - cron: '0 0 * * *'      # 00:00 UTC = 08:00 Hong Kong, daily
  workflow_dispatch:          # allow manual run from Actions tab

permissions:
  contents: write             # ← needed so the action can commit back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome and Python packages
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install selenium requests pytz

      - name: Run scraper
        run: python TipsON-Download.py

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add TipsON/
          git diff --staged --quiet || git commit -m "Update TipsON $(date +'%Y-%m-%d')"
          git push
